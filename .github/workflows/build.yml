name: 老君音乐APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: android-sdk
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
      - name: licenses
        run: yes | sdkmanager --licenses > /dev/null
      - name: keystore
        run: |
          mkdir -p app/keystore
          keytool -genkey -v -keystore app/keystore/debug.keystore -storepass android -keypass android -alias androiddebugkey -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 10000
      - name: signing
        run: |
          cat >> app/build.gradle << 'EOF'
android.signingConfigs {
    release {
        storeFile file('../keystore/debug.keystore')
        storePassword 'android'
        keyAlias 'androiddebugkey'
        keyPassword 'android'
    }
}
android.buildTypes.release {
    signingConfig android.signingConfigs.release
}
EOF
      - name: build
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon 2>&1 | tail -50
      - name: find
        run: find app/build/outputs -name "*.apk" -type f
      - name: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laojun-music-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
