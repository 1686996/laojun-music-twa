name: 老君音乐APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: android-sdk
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
      - name: licenses
        run: yes | sdkmanager --licenses > /dev/null
      - name: keystore
        run: |
          mkdir -p keystore
          keytool -genkey -v -keystore keystore/debug.keystore -storepass android -keypass android -alias androiddebugkey -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 10000
      - name: build
        run: |
          chmod +x gradlew
          echo "=== app/build.gradle ==="
          cat app/build.gradle
          echo "=== gradle deps ==="
          ./gradlew app:dependencies --configuration releaseCompileClasspath --no-daemon 2>&1 | tee deps.log
          echo "=== assemble ==="
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
          EXIT=${PIPESTATUS[0]}
          echo "--- exit code $EXIT ---"
          exit $EXIT
      - name: upload-log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
      - name: find
        run: find app/build/outputs -name "*.apk" -type f
      - name: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: laojun-music-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
