<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  
  <!-- 毛玻璃背景圆环 -->
  <circle cx="512" cy="512" r="280" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <circle cx="512" cy="512" r="240" fill="rgba(255,255,255,0.03)"/>
  
  <!-- 音符主体 -->
  <g transform="translate(512,512)">
    <!-- 音符椭圆形头部 -->
    <ellipse cx="-30" cy="-80" rx="65" ry="50" fill="url(#note)" transform="rotate(-20)"/>
    <!-- 音符竖线 -->
    <rect x="25" y="-130" width="12" height="320" rx="6" fill="url(#note)" transform="rotate(-20)"/>
    <!-- 音符尾巴 -->
    <path d="M 35 120 Q 60 100 100 80 Q 130 60 120 90 Q 110 120 80 130" 
          fill="none" stroke="url(#note)" stroke-width="8" stroke-linecap="round"/>
    <!-- 星星点缀 -->
    <circle cx="-100" cy="-120" r="12" fill="#ffd700" opacity="0.6"/>
    <circle cx="100" cy="-140" r="8" fill="#ffd700" opacity="0.4"/>
    <circle cx="-120" cy="80" r="6" fill="#ffd700" opacity="0.3"/>
    <circle cx="80" cy="-60" r="10" fill="#ffd700" opacity="0.5"/>
  </g>
</svg>
