<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  
  <!-- 毛玻璃背景圆环 -->
  <circle cx="512" cy="512" r="280" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <circle cx="512" cy="512" r="240" fill="rgba(255,255,255,0.03)"/>
  
  <!-- 音符主体 -->
  <g transform="translate(512,512)">
    <!-- 音符号杆 -->
    <rect x="-8" y="-280" width="20" height="340" rx="10" fill="url(#note)"/>
    <!-- 音符尾巴 -->
    <ellipse cx="60" cy="-80" rx="70" ry="55" fill="url(#note)" opacity="0.85"/>
    <ellipse cx="0" cy="60" rx="70" ry="55" fill="url(#note)"/>
    <!-- 高光 -->
    <ellipse cx="30" cy="30" rx="20" ry="12" fill="rgba(255,255,255,0.3)"/>
    <!-- 五线谱 -->
    <line x1="-120" y1="240" x2="120" y2="240" stroke="#ffd700" stroke-width="3" opacity="0.4"/>
    <line x1="-120" y1="220" x2="120" y2="220" stroke="#ffd700" stroke-width="3" opacity="0.4"/>
    <line x1="-120" y1="200" x2="120" y2="200" stroke="#ffd700" stroke-width="3" opacity="0.4"/>
    <line x1="-120" y1="180" x2="120" y2="180" stroke="#ffd700" stroke-width="3" opacity="0.4"/>
    <line x1="-120" y1="160" x2="120" y2="160" stroke="#ffd700" stroke-width="3" opacity="0.4"/>
  </g>
</svg>